<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Step Signup</title>

</head>

<body>

    <fieldset>
        <legend>Your Review</legend>

        <form>

            <label for="hear-about-us">How did you hear about us?</label>

            <select id="hear-about-us" name="hear-about-us" required>
                <option disabled selected value="">Select an option</option>
                <option value="social-media">Social Media</option>
                <option value="friend-family">Friend/Family</option>
                <option value="online-ad">Online Ad</option>
                <option value="other">Other</option>
            </select>

            <br>
            <br>
            <label>Would you visit us again?</label>

          
          
                    <input type="radio" id="yes" name="visit" value="yes">
                    <label for="yes">Yes</label>
          

          
                    <input type="radio" id="maybe" name="visit" value="maybe">
                    <label for="maybe">Maybe</label>
          

          
                    <input type="radio" id="no" name="visit" value="no">
                    <label for="no">No</label>
        <br>
        <br>
        

            <label for="comments">Comments</label>

            <textarea id="comments" name="comments"
                placeholder="Enter your comments here..."></textarea>

            <br>
            <br>

            <label for="documents">Upload Documents</label>

            <input type="file" name="documents" id="documents" multiple>

            <br>
            
                <a href="signup2.html">
                    <img width="130" src="./images/back.png" alt="Back Button">
                </a>

                <a href="Done.html">
                    <img width="130" src="./images/submit.png" alt="Submit Button">
                </a>
           

        </form>

    </fieldset>

</body>
</html>
