<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Step Signup</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:#f4f7fc;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        fieldset{
            width:100%;
            max-width:650px;
            background:#fff;
            border:none;
            border-radius:15px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        legend{
            font-size:24px;
            font-weight:bold;
            color:#2c3e50;
            padding:0 10px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        label{
            font-weight:600;
            color:#34495e;
        }

        select,
        textarea,
        input[type="file"]{
            width:100%;
            padding:12px;
            border:2px solid #dcdde1;
            border-radius:8px;
            font-size:16px;
            transition:0.3s;
        }

        select:focus,
        textarea:focus{
            outline:none;
            border-color:#3498db;
            box-shadow:0 0 8px rgba(52,152,219,0.3);
        }

        textarea{
            min-height:120px;
            resize:vertical;
        }

        .radio-group{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            align-items:center;
        }

        .radio-group label{
            font-weight:normal;
        }

        input[type="radio"]{
            margin-right:5px;
        }

        .btn-container{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:10px;
        }

        .btn-container img{
            width:130px;
            transition:transform 0.3s ease;
            cursor:pointer;
        }

        .btn-container img:hover{
            transform:scale(1.08);
        }

        @media (max-width:600px){

            fieldset{
                padding:25px;
            }

            .btn-container{
                flex-direction:column;
                gap:15px;
            }

            .btn-container img{
                width:120px;
            }
        }
    </style>
</head>

<body>

    <fieldset>
        <legend>Your Review</legend>

        <form>

            <label for="hear-about-us">How did you hear about us?</label>

            <select id="hear-about-us" name="hear-about-us" required>
                <option disabled selected value="">Select an option</option>
                <option value="social-media">Social Media</option>
                <option value="friend-family">Friend/Family</option>
                <option value="online-ad">Online Ad</option>
                <option value="other">Other</option>
            </select>

            <label>Would you visit us again?</label>

            <div class="radio-group">
                <div>
                    <input type="radio" id="yes" name="visit" value="yes">
                    <label for="yes">Yes</label>
                </div>

                <div>
                    <input type="radio" id="maybe" name="visit" value="maybe">
                    <label for="maybe">Maybe</label>
                </div>

                <div>
                    <input type="radio" id="no" name="visit" value="no">
                    <label for="no">No</label>
                </div>
            </div>

            <label for="comments">Comments</label>

            <textarea id="comments" name="comments"
                placeholder="Enter your comments here..."></textarea>

            <label for="documents">Upload Documents</label>

            <input type="file" name="documents" id="documents" multiple>

            <div class="btn-container">
                <a href="signup2.html">
                    <img src="./images/back.png" alt="Back Button">
                </a>

                <a href="Done.html">
                    <img src="./images/submit.png" alt="Submit Button">
                </a>
            </div>

        </form>

    </fieldset>

</body>
</html>
