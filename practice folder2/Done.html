<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4CAF50, #2ecc71);
            padding: 20px;
        }

        .success-card {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #27ae60;
            font-size: 40px;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #27ae60;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #219150;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .success-card {
                padding: 35px 25px;
            }

            h1 {
                font-size: 32px;
            }

            .icon {
                font-size: 65px;
            }
        }
    </style>
</head>

<body>

    <div class="success-card">
        <div class="icon">✅</div>

        <h1>Congratulations!</h1>

        <p>
            Your account has been created successfully.
            Thank you for completing the registration form.
        </p>

        <a href="index.html" class="btn">Go to Home</a>
    </div>

</body>
</html>
